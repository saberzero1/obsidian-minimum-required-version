name: Update Registry

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Check for new obsidian version
        id: check
        run: |
          CURRENT=$(node -e "const r=JSON.parse(require('fs').readFileSync('packages/core/src/registry.json','utf8')); console.log(r.generatedFrom.replace('obsidian@',''))")
          LATEST=$(npm view obsidian version)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update obsidian package
        if: steps.check.outputs.updated == 'true'
        run: pnpm add -Dw obsidian@${{ steps.check.outputs.latest }}

      - name: Regenerate registry
        if: steps.check.outputs.updated == 'true'
        run: pnpm extract-registry

      - name: Create pull request
        if: steps.check.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          title: "chore: update registry for obsidian@${{ steps.check.outputs.latest }}"
          body: |
            Updates the API registry from obsidian@${{ steps.check.outputs.current }} to obsidian@${{ steps.check.outputs.latest }}.

            Auto-generated by the Update Registry workflow.
          branch: update-registry/obsidian-${{ steps.check.outputs.latest }}
          commit-message: "chore: update registry for obsidian@${{ steps.check.outputs.latest }}"
