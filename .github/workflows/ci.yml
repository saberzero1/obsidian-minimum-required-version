name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - name: Validate core package exports
        run: pnpm exec attw --pack packages/core
        continue-on-error: true

      - name: Validate eslint-plugin exports
        run: pnpm exec attw --pack packages/eslint-plugin
        continue-on-error: true

      - name: Lint core package
        run: pnpm exec publint packages/core

      - name: Lint eslint-plugin package
        run: pnpm exec publint packages/eslint-plugin
